# Cero — config. Secrets live in .env, NOT here.

# ──────────────────────────────────────────────────────────────────────
# EXCHANGE
# ──────────────────────────────────────────────────────────────────────
exchange:
   # ccxt exchange id: bybit | binance | okx | hyperliquid
   name: binance              # your TRADING venue (for real orders, later)

   # Keep true until a strategy is validated. (Momentum is always paper for now,
   # so this only matters once you switch to real-money order modes.)
   testnet: true

   # Chart-data source — can be a DIFFERENT exchange than `name`. Trading targets
   # binance; candles come from bybit (crypto-only perps = clean momentum
   # universe, reachable, validated). Public data, no keys. null = use `name`.
   # (okx works too but mixes tokenized stocks/gold into the universe.)
   data_exchange: bybit

   # false = always pull mainnet prices even on testnet (testnet OHLCV is garbage).
   market_data_testnet: false

   margin_mode: cross         # isolated | cross  (real orders only)
   leverage: 5                # max position-size leverage (real orders only)

# ──────────────────────────────────────────────────────────────────────
# ENGINE — which strategy Cero runs
# ──────────────────────────────────────────────────────────────────────
# momentum — daily long/short cross-sectional momentum; auto-discovers its
#            universe (the validated edge). THIS is the active strategy. Paper.
# smc      — old per-symbol intraday strategy (no proven edge; kept as a
#            fallback — its settings default in code if you switch to it).
engine: momentum

momentum:
   auto_universe: true        # auto-pick the most-liquid coins (no fixed list)
   universe_size: 50          # consider the top-N perps by 24h volume
   min_volume_usd: 20000000   # liquidity floor — ignore coins below $20M/24h
   # lookbacks: [20, 30, 60]  # momentum windows (ensemble); defaults are fine
   # rebalance_days: 5
   # paper_equity: 10000

# ──────────────────────────────────────────────────────────────────────
# RISK MANAGEMENT
#   Used by the smc engine and the manual /trip kill-switch. Momentum is
#   market-neutral and doesn't size off these yet.
# ──────────────────────────────────────────────────────────────────────
risk:
   base_risk_per_trade_pct: 0.5
   max_daily_loss_pct: 3.0
   max_consecutive_losses: 4
   max_concurrent_positions: 3
   tier_sizing: { A: 1.0, B: 0.5, C: 0.0, D: 0.0 }
   tier_thresholds: { A: 80, B: 60, C: 40 }

# ──────────────────────────────────────────────────────────────────────
# ALERTING (Telegram)
# ──────────────────────────────────────────────────────────────────────
alerts:
   on_signal: false           # per-signal spam off; momentum notifies on rebalance
   on_fill: true
   on_close: true
   on_trip: true
   on_news_blackout: true

# ──────────────────────────────────────────────────────────────────────
# NEWS / EVENT BLACKOUT (context only)
# ──────────────────────────────────────────────────────────────────────
news:
   blackout_minutes_before: 15
   blackout_minutes_after: 15
   blackout_impacts: [high, medium]
   sources: [forexfactory]
   rss_feeds:
      - https://cointelegraph.com/rss
      - https://www.reddit.com/r/cryptocurrency/.rss
   twitter_watchlist: [WuBlockchain, Cointelegraph, DocumentingBTC]

# ──────────────────────────────────────────────────────────────────────
# WEB DASHBOARD
# ──────────────────────────────────────────────────────────────────────
web:
   host: 127.0.0.1            # localhost only; 0.0.0.0 ONLY behind a firewall/VPN
   port: 8765
   auth_user: ""
   auth_pass: ""

# ──────────────────────────────────────────────────────────────────────
# DATABASE / LOGGING
# ──────────────────────────────────────────────────────────────────────
database:
   path: data/cero.db
   echo: false

logging:
   level: INFO                # DEBUG | INFO | WARNING | ERROR
   file: logs/cero.log
   rotate_mb: 50
   keep_files: 5
